name: CI
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'   # <- set to match your local `node -v` major
          cache: 'npm'

      - run: npm ci
      - run: npm run lint || true  # TODO: fix 289 pre-existing lint issues then enforce
      - run: npm run typecheck
      - run: npm run build
      - run: npm test --if-present
